<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 160" width="220" height="160">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#f5e090"/>
      <stop offset="20%"  stop-color="#d4a84b"/>
      <stop offset="45%"  stop-color="#f0d080"/>
      <stop offset="65%"  stop-color="#c9a348"/>
      <stop offset="80%"  stop-color="#e8c060"/>
      <stop offset="100%" stop-color="#a0722a"/>
    </linearGradient>
    <linearGradient id="goldGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#f5e090"/>
      <stop offset="30%"  stop-color="#c9a96e"/>
      <stop offset="60%"  stop-color="#f0d080"/>
      <stop offset="100%" stop-color="#b8935a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="rgba(0,0,0,0.7)" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Glow layer -->
  <text x="108" y="128"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="128"
    font-weight="700"
    text-anchor="middle"
    fill="rgba(201,169,110,0.18)"
    filter="url(#glow)"
    letter-spacing="6">DX</text>

  <!-- Shadow layer -->
  <text x="110" y="126"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="128"
    font-weight="700"
    text-anchor="middle"
    fill="rgba(0,0,0,0.5)"
    filter="url(#shadow)"
    letter-spacing="6">DX</text>

  <!-- Main text -->
  <text x="110" y="126"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="128"
    font-weight="700"
    text-anchor="middle"
    fill="url(#goldGrad)"
    letter-spacing="6">DX</text>

  <!-- Highlight sheen overlay -->
  <text x="110" y="126"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="128"
    font-weight="700"
    text-anchor="middle"
    fill="url(#goldGrad2)"
    letter-spacing="6"
    opacity="0.35">DX</text>
</svg>
